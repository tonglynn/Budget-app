<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
     <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data:; script-src 'self'; style-src 'self';">
    <title>Budget Web App | javascript</title>
    <link href="./style.css" rel="stylesheet" type="text/css" />
  </head>
  <body>
    <div id="cookie-banner" class="cookie-banner">
      <div class="cookie-content">
        <p class="cookie-text" data-i18n="cookieMessage">
          We use cookies to improve your experience. By continuing, you agree to our use of cookies.
        </p>
        <div class="cookie-actions">
          <a href="privacy.html" class="privacy-link" data-i18n="privacyPolicy">Privacy Policy</a>
          <button id="cookie-accept" class="cookie-btn cookie-btn-primary" data-i18n="accept">Accept</button>
          <button id="cookie-decline" class="cookie-btn cookie-btn-secondary" data-i18n="decline">Decline</button>
        </div>
      </div>
    </div>

    <div class="budget-container">
      <header class="page-header">
      <div class="app-title">
        <a href="">Budget<b>App</b></a>
      </div>

      <div class="language-switcher">
        <label for="lang-select" class="language-label" data-i18n="languageLabel">
          Language Selection
        </label>
        <select id="lang-select" aria-label="Language Selection">
          <option value="en">English</option>
          <option value="zh">中文</option>
          <option value="ja">日本語</option>
        </select>
      </div>

      <div class="budget-header">
        <div class="balance">
          <div class="title" data-i18n="balance">Balance</div>
          <div class="value"><small>$</small>0</div>
        </div>
        <div class="account">
          <div class="income">
            <div class="title" data-i18n="income">Income</div>
            <div class="income-total"><small>$</small>0</div>
          </div>
          <div class="chart"></div>
          <div class="outcome">
            <div class="title" data-i18n="outcome">Outcome</div>
            <div class="outcome-total"><small>$</small>0</div>
          </div>
        </div>
      </div>
   </header>

      <main class="budget-dashboard">
        <h1 class="dash-title" data-i18n="dashboard">Dashboard</h1>
        <div class="toggle">
          <div class="first-tab" data-i18n="expenses">Expenses</div>
          <div class="second-tab" data-i18n="income">Income</div>
          <div class="third-tab focus" data-i18n="all">All</div>
        </div>

        <div class="hide" id="expense">
          <ul class="list"></ul>
          <div class="input">
            <label for="expense-title-input" class="sr-only">Expense title</label>
            <input
              type="text"
              id="expense-title-input"
              name="title"
              placeholder="title"
              data-i18n-placeholder="titlePlaceholder"
            />
            <label for="expense-amount-input" class="sr-only">Expense amount</label>
            <input
              type="number"
              id="expense-amount-input"
              name="amount"
              placeholder="$0"
            />
            <button class="add-expense" type="button" aria-label="Add expense">
            <img src="icon/plus.png" alt="" />
            </button>
          </div>
        </div>

        <div class="hide" id="income">
          <ul class="list"></ul>
          <div class="input">
            <label for="income-title-input" class="sr-only">Income title</label>
            <input
              type="text"
              id="income-title-input"
              name="title"
              placeholder="title"
              data-i18n-placeholder="titlePlaceholder"
            />
            
            <label for="income-amount-input" class="sr-only">Income amount</label>
            <input
              type="number"
              id="income-amount-input"
              name="amount"
              placeholder="$0"
            />
            <button class="add-income" type="button" aria-label="Add income">
            <img src="icon/plus.png" alt="" />
            </button>
          </div>
        </div>

        <div id="all">
          <ul class="list"></ul>
        </div>
     </main>

    <script src="./chart.js"></script>
    <script src="./budget.js"></script>
  </body>
</html>
