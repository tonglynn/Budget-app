<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Budget Web App | javascript</title>
    <link href="./style.css" rel="stylesheet" type="text/css" />
  </head>
  <body>
    <div class="budget-container">
      <div class="app-title">
        <a href="">Budget<b>App</b></a>
      </div>

      <div class="language-switcher" style="text-align: right;">
        <button id="lang-en" type="button">EN</button>
        <button id="lang-zh" type="button">中文</button>
      </div>

      <div class="budget-header">
        <div class="balance">
          <div class="title" data-i18n="balance">Balance</div>
          <div class="value"><small>$</small>0</div>
        </div>
        <div class="account">
          <div class="income">
            <div class="title" data-i18n="income">Income</div>
            <div class="income-total"><small>$</small>0</div>
          </div>
          <div class="chart"></div>
          <div class="outcome">
            <div class="title" data-i18n="outcome">Outcome</div>
            <div class="outcome-total"><small>$</small>0</div>
          </div>
        </div>
      </div>
      <div class="budget-dashboard">
        <div class="dash-title" data-i18n="dashboard">Dashboard</div>
        <div class="toggle">
          <div class="first-tab" data-i18n="expenses">Expenses</div>
          <div class="second-tab" data-i18n="income">Income</div>
          <div class="third-tab focus" data-i18n="all">All</div>
        </div>
        <div class="hide" id="expense">
          <ul class="list"></ul>
          <div class="input">
            <input
              type="text"
              id="expense-title-input"
              name="title"
              placeholder="title"
              data-i18n-placeholder="titlePlaceholder"
            />
            <input
              type="number"
              id="expense-amount-input"
              name="amount"
              placeholder="$0"
            />
            <div class="add-expense">
              <img src="icon/plus.png" alt="Add expense" />
            </div>
          </div>
        </div>
        <div class="hide" id="income">
          <ul class="list"></ul>
          <div class="input">
            <input
              type="text"
              id="income-title-input"
              name="title"
              placeholder="title"
              data-i18n-placeholder="titlePlaceholder"
            />
            <input
              type="number"
              id="income-amount-input"
              name="amount"
              placeholder="$0"
            />
            <div class="add-income">
              <img src="icon/plus.png" alt="Add income" />
            </div>
          </div>
        </div>
        <div id="all">
          <ul class="list"></ul>
        </div>
      </div>
    </div>
    <script src="./chart.js"></script>
    <script src="./budget.js"></script>
  </body>
</html>
